name: CI/CD — Test, Build, Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run unit tests
        run: npm test

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to GCI VM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/vboxuser
          chmod 600 ~/.ssh/vboxuser
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/vboxuser ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            set -e
            mkdir -p ~/MISEIA1-4-130-invoicing
            cd ~/MISEIA1-4-130-invoicing
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest
            cat > docker-compose.yml << 'EOF'
          services:
            invoicing-app:
              image: ghcr.io/${{ github.repository }}:latest
              container_name: invoicing-app
              restart: unless-stopped
              env_file: .env.production
              networks:
                - miseia-net
              labels:
                - "traefik.enable=true"
                - "traefik.http.routers.invoicing.rule=Host(`invoicing.deviaaps.com`)"
                - "traefik.http.routers.invoicing.entrypoints=websecure"
                - "traefik.http.routers.invoicing.tls=true"
                - "traefik.http.routers.invoicing.tls.certresolver=cloudflare"
                - "traefik.http.services.invoicing.loadbalancer.server.port=3000"
          networks:
            miseia-net:
              external: true
          EOF
            docker compose up -d --remove-orphans
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          curl -f https://invoicing.deviaaps.com || echo "Health check failed - app may still be starting"
