stages:
  - test
  - build
  - deploy

variables:
  APP_DIR: /home/gcvmuser/MISEIA1-4-130-invoicing

# ── Test ─────────────────────────────────────────────────────────────────────
test:
  stage: test
  tags:
    - shell
  before_script:
    - npm ci
  script:
    - npm run lint
    - npm test
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ── Build ─────────────────────────────────────────────────────────────────────
build:
  stage: build
  tags:
    - shell
  script:
    - NODE_ENV=production docker build -t invoicing-app:latest -t invoicing-app:$CI_COMMIT_SHA .
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# ── Deploy ────────────────────────────────────────────────────────────────────
deploy:
  stage: deploy
  tags:
    - shell
  script:
    - mkdir -p $APP_DIR
    - cp docker-compose.gitlab.yml $APP_DIR/docker-compose.yml
    - cd $APP_DIR && docker compose up -d --remove-orphans
    - sleep 10 && curl -sf https://invoicing.deviaaps.com -o /dev/null && echo "Health check passed" || echo "Health check pending"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  environment:
    name: production
    url: https://invoicing.deviaaps.com
